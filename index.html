<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק הקלפים שלנו</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #password-screen, #login-screen, #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        #login-screen, #game-screen { display: none; }
        
        #password-input {
            padding: 10px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 8px;
            border: none;
        }
        .btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background-color: #c0392b; }
        
        /* אזור הקלפים */
        .cards-container {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }
        .card-slot {
            width: 250px;
            height: 350px;
            perspective: 1000px; /* תלת מימד */
        }
        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            cursor: pointer;
        }
        .card-slot.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.2rem;
        }
        /* גב הקלף - כאן תשים את העיצוב שלך */
        .card-back {
            background-image: url('card-back.png');
        }
        /* פני הקלף (המשימה) */
        .card-front {
            transform: rotateY(180deg);
            background-color: #ecf0f1
        }
        .partner-msg {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            color: white;
        }

        #status-msg { margin-top: 20px; font-size: 1.2rem; min-height: 30px; color: #f1c40f;}
    </style>
</head>
<body>
    <div id="password-screen">
        <h1>נא להזין סיסמה:</h1>
        <input type="password" id="password-input" placeholder="סיסמה...">
        <button class="btn" onclick="checkPassword()">היכנס</button>
        <div id="pass-error" style="color: #ffb8b8; margin-top: 10px; font-weight: bold;"></div>
    </div>
    
    <div id="login-screen">
        <h1>מי משחק עכשיו?</h1>
        <div>
            <button class="btn" onclick="joinGame('דניאל')">דניאל</button>
            <button class="btn" onclick="joinGame('עדן')">עדן</button>
        </div>
    </div>

    <div id="game-screen">
        <h2 id="welcome-msg"></h2>
        <div id="cards-count">קלפים נותרו: --</div>
        
        <div class="cards-container">
            <div class="card-slot" id="deck-slot" onclick="drawCard()">
                <div class="card-inner">
                    <div class="card-back">הערימה (שלוף)</div>
                </div>
            </div>

            <div class="card-slot" id="active-card-slot">
                <div class="card-inner" id="active-card-inner">
                    <div class="card-back" id="active-card-back">קלף של...</div>
                    <div class="card-front">
                        <div class="category" id="card-category"></div>
                        <div id="card-text"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="status-msg"></div>
        <button class="btn" style="margin-top: 50px; background-color: #7f8c8d;" onclick="resetGame()">ערבב והתחל מחדש</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // !!! הדבק כאן את ה-firebaseConfig שלך מ-Firebase Console !!!
        const firebaseConfig = {
            apiKey: "AIzaSyA9OVDYB_0ES8mFV8259XnXvHlEfhe1zs8",
            authDomain: "card-game-c3384.firebaseapp.com",
            databaseURL: "https://card-game-c3384-default-rtdb.firebaseio.com/",
            projectId: "card-game-c3384",
            storageBucket: "card-game-c3384.appspot.com",
            messagingSenderId: "826274012499",
            appId: "1:826274012499:web:27a9d98fd05693ad1bd5a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const allCards = Array.from({ length: 18 }, (_, i) => ({
            id: i + 1,
            image: `card${i + 1}.png`
            }));

        const cardBack = "card-back.png";

        let currentPlayer = "";
        
        window.checkPassword = function() {
            const pass = document.getElementById('password-input').value;
            
            if (pass === "1234") { // שנה את ה-1234 לסיסמה שאתה רוצה
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            } else {
                document.getElementById('pass-error').innerText = "סיסמה שגויה!";
            }
        }

        // פונקציית התחברות
        window.joinGame = function(name) {
            currentPlayer = name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('welcome-msg').innerText = `היי ${currentPlayer}!`;
            
            // האזנה לשינויים במסד הנתונים
            listenToGameState();
        }

        // פונקציה לערבוב מערך
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // אתחול משחק חדש ב-DB
        window.resetGame = async function() {
            const shuffled = shuffleArray(allCards);
            await set(ref(db, 'gameState'), {
                deck: shuffled,
                activeCard: null
            });
        }

        // שליפת קלף
        window.drawCard = async function() {
            const snapshot = await get(ref(db, 'gameState/deck'));
            let deck = snapshot.val();
            
            if (!deck || deck.length === 0) {
                alert("הערימה ריקה! הגיע הזמן לערבב מחדש.");
                return;
            }

            // מוציאים את הקלף העליון (האחרון במערך)
            const cardToDraw = deck.pop();

            // מעדכנים את ה-DB עם הערימה החדשה והקלף הפעיל
            await update(ref(db, 'gameState'), {
                deck: deck,
                activeCard: {
                    ...cardToDraw,
                    drawnBy: currentPlayer
                }
            });
        }

        // האזנה לשינויים בזמן אמת
        function listenToGameState() {
            const gameStateRef = ref(db, 'gameState');
            onValue(gameStateRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    // אם אין משחק פעיל, נייצר אחד
                    resetGame();
                    return;
                }

                // עדכון ספירת קלפים
                const deckCount = data.deck ? data.deck.length : 0;
                document.getElementById('cards-count').innerText = `קלפים נותרו: ${deckCount}`;

                const activeCardSlot = document.getElementById('active-card-slot');
                const statusMsg = document.getElementById('status-msg');
                const cardFrontImage = document.querySelector('.card-front');
                const activeCardBack = document.getElementById('active-card-back');

                if (data.activeCard) {
                    if (data.activeCard.drawnBy === currentPlayer) {
                        // אם אני שלפתי את הקלף - תראה לי אותו
                        cardFrontImage.style.backgroundImage = `url('${data.activeCard.image}')`;
                        activeCardSlot.classList.add('flipped');
                        statusMsg.innerText = "זה הקלף שלך!";
                    } else {
                       // אם בן/בת הזוג שלף - תראה לי את הגב עם הודעה
                       activeCardSlot.classList.remove('flipped');
                        activeCardBack.innerHTML = `<div class="partner-msg">הקלף של ${data.activeCard.drawnBy}</div>`;
                        statusMsg.innerText = `${data.activeCard.drawnBy} שלפ/ה קלף. מחכים שיסיימו...`;
                    }
                } else {
                    // אין קלף פעיל
                    activeCardSlot.classList.remove('flipped');
                    activeCardBack.innerHTML = '';
                    statusMsg.innerText = "תור מי לשלוף?";
                }
            });
        }
    </script>
</body>
</html>
