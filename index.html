<!DOCTYPE html>
<html lang="he" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>משחק הקלפים שלנו</title>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --red:        #e74c3c;
                --red-dark:   #c0392b;
                --gold:       #f1c40f;
                --gold-soft:  #f9d94e;
                --slate:      #2c3e50;
            }
    
            *, *::before, *::after { box-sizing: border-box; }
    
            body {
                font-family: 'Rubik', sans-serif;
                background-color: var(--slate);
                color: white;
                display: flex; flex-direction: column; align-items: center;
                min-height: 100vh; margin: 0; overflow: hidden;
            }
    
            #password-screen, #login-screen, #game-screen {
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                width: 100%; height: 100vh; position: relative; z-index: 1;
            }
    
            #password-screen {
                background-image: linear-gradient(rgba(44, 62, 80, 0.82), rgba(44, 62, 80, 0.82)), url('front-page.jpeg');
                background-size: cover; background-position: center;
                animation: screenReveal 0.7s cubic-bezier(0.22,1,0.36,1) both;
            }
            #login-screen  { display: none; }
            #game-screen   { display: none; justify-content: flex-start; padding-top: 28px; }
    
            @keyframes screenReveal {
                from { opacity: 0; transform: scale(1.03); }
                to   { opacity: 1; transform: scale(1); }
            }
    
            .screen-title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; margin-bottom: 24px; color: #ffb3b3; text-shadow: 0 2px 12px rgba(0,0,0,0.4); }
            .login-subtitle { font-weight: 300; font-size: 1rem; opacity: 0.65; margin-bottom: 24px; }
    
            #password-input {
                padding: 12px 20px; font-size: 1.15rem; font-family: 'Rubik', sans-serif; margin-bottom: 16px;
                text-align: center; border-radius: 50px; border: 2px solid transparent; background: rgba(255,255,255,0.95);
                color: #333; width: 220px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            }
            #password-input:focus { border-color: #ff8080; box-shadow: 0 0 0 4px rgba(255,128,128,0.2); }
    
            #pass-error {
                color: #ffb8b8; margin-top: 8px; font-weight: 500; font-size: 0.95rem; min-height: 24px;
            }
            .shake-animation { animation: shake 0.4s ease both; }
            @keyframes shake {
                0%,100%{ transform: translateX(0); }
                20%    { transform: translateX(-8px); }
                60%    { transform: translateX(8px); }
            }
    
            .btn {
                font-family: 'Rubik', sans-serif; background: linear-gradient(135deg, var(--red), #c0392b);
                color: white; border: none; padding: 13px 32px; font-size: 1.1rem; font-weight: 600;
                border-radius: 50px; cursor: pointer; margin: 8px;
                box-shadow: 0 6px 20px rgba(231,76,60,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
                transition: transform 0.15s ease, box-shadow 0.15s ease;
            }
            .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(231,76,60,0.5); }
            .btn:active { transform: translateY(0) scale(0.97); }
            .btn-secondary { background: rgba(255,255,255,0.12); box-shadow: none; border: 1px solid rgba(255,255,255,0.2); font-weight: 400; }
    
            #welcome-msg { font-size: 0.85rem; font-weight: 300; opacity: 0.55; letter-spacing: 2.5px; text-transform: uppercase; margin: 0 0 4px 0; }
            #cards-count { font-size: 0.95rem; font-weight: 400; opacity: 0.8; margin-bottom: 0; min-height: 22px; transition: opacity 0.3s; }
            #cards-count.milestone { color: var(--gold-soft); font-weight: 600; opacity: 1; }
    
            .cards-container { display: flex; gap: 28px; margin-top: 24px; align-items: center; }
            .card-slot { width: 220px; height: 320px; perspective: 1200px; transition: transform 0.15s ease; }
            #deck-slot:hover { transform: translateY(-4px); }
            #deck-slot:active { transform: translateY(0) scale(0.98); }
    
            .card-inner { width: 100%; height: 100%; transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; position: relative; cursor: pointer; }
            .card-slot.flipped .card-inner { transform: rotateY(180deg); }
    
            .card-front, .card-back {
                width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 18px;
                box-shadow: 0 16px 40px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.2);
                background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; text-align: center;
            }
            .card-back { background-image: url('card-back.png'); background-color: #1a252f; }
            .card-back-label { background: rgba(0,0,0,0.45); color: white; padding: 10px 18px; border-radius: 30px; backdrop-filter: blur(4px); }
            .card-front { transform: rotateY(180deg); background-color: #f8f0e8; }
            .partner-msg { background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); padding: 12px 20px; border-radius: 10px; color: white; }
    
            #status-msg { margin-top: 22px; font-size: 1.15rem; font-weight: 500; min-height: 32px; color: var(--gold); text-shadow: 0 1px 8px rgba(0,0,0,0.3); }
            .status-pulse { animation: pulse 0.45s cubic-bezier(0.22,1,0.36,1); }
            @keyframes pulse { 0% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.08); opacity: 1; color: #fff; } 100% { transform: scale(1); opacity: 1; } }
    
            .reset-area { margin-top: auto; padding: 16px 0 24px; }
    
            /* הרקע המקורי שלך - שמרנו עליו! */
            #game-background {
                position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
                background-color: #111; overflow: hidden;
                background-image: url('front-page.jpeg'); background-size: 0 0;
                transition: background-image 1.5s ease-in-out;
            }
            #game-background::before {
                content: ""; position: absolute; top: -40px; left: -40px; right: -40px; bottom: -40px;
                background-image: inherit; background-size: cover; background-position: center;
                filter: blur(25px); z-index: 1; transition: background-image 1.5s ease-in-out;
            }
            #game-background::after {
                content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
                background-image: inherit; background-size: contain; background-position: center; background-repeat: no-repeat;
                filter: blur(2px); z-index: 2; transition: background-image 1.5s ease-in-out;
            }
            #game-background-overlay { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at center, rgba(20,30,40,0.0) 0%, rgba(20,30,40,0.6) 100%); pointer-events: none; }
    
            @media (max-width: 600px) {
                #game-screen { padding-top: 20px; } .card-slot { width: 150px; height: 220px; } .cards-container { gap: 14px; margin-top: 18px; }
            }
        </style>
    </head>
<body>
    <div id="game-background"></div>
    <div id="game-background-overlay"></div>

    <div id="password-screen">
        <h1 class="screen-title">מתי התחלנו לצאת?</h1>
        <input type="tel" id="password-input" placeholder="הכנס תאריך...">
        <button class="btn" onclick="checkPassword()">בואי נתחיל ❤️</button>
        <div id="pass-error"></div>
    </div>

    <div id="login-screen">
        <h1 class="screen-title" style="color:white;">של מי התור להוביל?</h1>
        <p class="login-subtitle">בחר/י את שמך כדי להתחיל</p>
        <div>
            <button class="btn" onclick="joinGame('דניאל')">דניאל</button>
            <button class="btn" onclick="joinGame('עדן')">עדן</button>
        </div>
    </div>

    <div id="game-screen">
        <h2 id="welcome-msg"></h2>
        <div id="cards-count">טוען...</div>

        <div class="cards-container">
            <div class="card-slot" id="deck-slot" onclick="drawCard()">
                <div class="card-inner">
                    <div class="card-back"><span class="card-back-label">לחץ/י לשליפה</span></div>
                </div>
            </div>

            <div class="card-slot" id="active-card-slot">
                <div class="card-inner" id="active-card-inner">
                    <div class="card-back" id="active-card-back"><span id="active-card-back-label"></span></div>
                    <div class="card-front"><div class="card-front-content" id="card-text"></div></div>
                </div>
            </div>
        </div>

        <div id="status-msg"></div>

        <div class="reset-area">
            <button class="btn btn-secondary" onclick="resetGame()">ערבב והתחל מחדש ↺</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // !!! הדבק כאן את ה-firebaseConfig שלך מ-Firebase Console !!!
        const firebaseConfig = {
            apiKey: "AIzaSyA9OVDYB_0ES8mFV8259XnXvHlEfhe1zs8",
            authDomain: "card-game-c3384.firebaseapp.com",
            databaseURL: "https://card-game-c3384-default-rtdb.firebaseio.com/",
            projectId: "card-game-c3384",
            storageBucket: "card-game-c3384.appspot.com",
            messagingSenderId: "826274012499",
            appId: "1:826274012499:web:27a9d98fd05693ad1bd5a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const allCards = Array.from({ length: 18 }, (_, i) => ({
            id: i + 1,
            image: `card${i + 1}.png`,
            bg: `bg${i + 1}.jpeg` // הוספנו את הקישור לתמונת הרקע הייעודית
        }));

        const cardBack = "card-back.png";

        let currentPlayer = "";
        let unsubscribeGameState = null; 
        /* ── פונקציית אבני הדרך (מונה קלפים רומנטי) ── */
        // DeckAgent — רק מחזיר נתונים
        function getCardCountData(count) {
            const milestones = { 18: "...", 10: "...", 5: "...", 1: "...", 0: "..." };
            return {
                text: milestones[count] || `עוד ${count} הפתעות`,
                isMilestone: milestones[count] !== undefined
            };
        }

        // UIAgent — רק מציג
        function renderCardCount(count) {
            const { text, isMilestone } = getCardCountData(count);
            const el = document.getElementById('cards-count');
            el.innerText = text;
            el.classList.toggle('milestone', isMilestone);
            
            // בונוס: קונפטי ב-milestone!
            if (isMilestone && count > 0) {
                confetti({ particleCount: 80, spread: 60, origin: { y: 0.5 } });
            }
        }

        /* ── פונקציית פעימת הלב (סטטוס) ── */
        function setStatusMsg(text) {
            const el = document.getElementById('status-msg');
            el.innerText = text;
            // הטריק הזה מאפס את האנימציה כדי שהיא תקרה שוב בכל פעם שמחליפים טקסט
            el.classList.remove('status-pulse');
            void el.offsetWidth; 
            el.classList.add('status-pulse');
        }

        /* ── הודעות המתנה ── */
        const waitingMessages = {
            'דניאל': [
            `דניאל בוחר משהו בשבילך... 💙`,
            `דניאל מכין הפתעה ✨`,
            `חכי — זה הולך להיות טוב 🤫`
            ],
            'עדן': [
                `עדן בוחרת משהו בשבילך... 💛`,
                `עדן מכינה הפתעה ✨`,
                `חכה — זה הולך להיות טוב 🤫`
            ]
        };

       
        window.checkPassword = function() {
            const pass = document.getElementById('password-input').value.trim();
            const errEl = document.getElementById('pass-error');
            if (pass === "23.3.25") { 
                confetti({ particleCount: 1000, spread: 700, origin: { y: 0.6 }, shapes: ['heart'], colors: ['#ff0000', '#ffb3b3'] });
                setTimeout(() => {
                    document.getElementById('password-screen').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                }, 1500);
            } else {
                // מפעיל אנימציית רעידה כשהסיסמה שגויה
                errEl.classList.remove('shake-animation');
                void errEl.offsetWidth;
                errEl.classList.add('shake-animation');
                errEl.innerText = "תאריך שגוי, בזיון שאת לא זוכרת!! 😤";
            }
        }

        document.getElementById('password-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // פונקציית התחברות
        window.joinGame = function(name) {
            currentPlayer = name;
            sessionStorage.setItem('savedPlayer', name);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('welcome-msg').innerText = `היי ${currentPlayer}!`;
            
            // האזנה לשינויים במסד הנתונים
            listenToGameState();
        }

        // פונקציה לערבוב מערך
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // אתחול משחק חדש ב-DB
        window.resetGame = async function() {
            const shuffled = shuffleArray(allCards);
            await set(ref(db, 'gameState'), {
                deck: shuffled,
                activeCard: null,
                currentTurn: 'עדן' // מי מתחיל
            });
        }

        // שליפת קלף
        window.drawCard = async function() {
            const gameref = ref(db, 'gameState');
        
            try {
                const transactionResult = await runTransaction(gameref, (currentData) => {
                    // 1. הגנה: אם אין משחק או אין קלפים
                    if (currentData === null || !currentData.deck || currentData.deck.length === 0) {
                        return; 
                    }
                    
                    // 2. הגנה: בדיקת תור! אם זה לא התור של השחקן, נבטל את הפעולה (Abort)
                    if (currentData.currentTurn !== currentPlayer) {
                        return; // הפעולה מבוטלת מאחורי הקלעים
                    }
        
                    // 3. אם הכל תקין והתור שלי - נשלוף קלף
                    const deck = [...currentData.deck];
                    const cardDraw = deck.pop();
                    const nextTurn = currentData.currentTurn === 'דניאל' ? 'עדן' : 'דניאל';
                    
                    return {
                        ...currentData,
                        deck: deck,
                        activeCard: {
                            ...cardDraw,
                            drawnBy: currentPlayer
                        },
                        currentTurn: nextTurn
                    };
                });

                // כאן אנחנו בודקים למה הטרנזקציה נכשלה/בוטלה
                if (!transactionResult.committed) {
                    // קודם נבדוק אם אולי פשוט ניסו לגנוב תור
                    get(gameref).then((snapshot) => {
                        const data = snapshot.val();
                        if (data && data.currentTurn !== currentPlayer) {
                            setStatusMsg(`זה לא התור שלך — המתן/י ל${data.currentTurn} 😊`);
                        } else {
                            // אם התור בסדר, כנראה שפשוט נגמרו הקלפים
                            setStatusMsg("נגמרו הקלפים, נכון שאני הכי טוב? אוהב אותך מלא! ❤️");
                        }
                    });
                }
            } catch (error) {
                console.error("שגיאה בשליפת קלף:", error);
                setStatusMsg("אופס היה race condition, ננסה שוב");
            }
        }; 
        // האזנה לשינויים בזמן אמת
        // האזנה לשינויים בזמן אמת
        function listenToGameState() {
            const gameStateRef = ref(db, 'gameState');
            if (unsubscribeGameState) {
                unsubscribeGameState();
            }

            unsubscribeGameState = onValue(gameStateRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    resetGame();
                    return;
                }

                // 1. שימוש במונה הקלפים החדש
                const deckCount = data.deck ? data.deck.length : 0;
                document.getElementById('cards-count').innerText = getCardCountMessage(deckCount);

                const activeCardSlot = document.getElementById('active-card-slot');
                const cardFrontImage = document.querySelector('.card-front');
                const activeCardBack = document.getElementById('active-card-back');
                const gameBg = document.getElementById('game-background');
                if (deckCount === 0 && !data.activeCard) {
                    // הגדר מצב "game over" ב-Firebase
                    setStatusMsg("כל הקלפים נחשפו. לעוד הרבה שנים יחד!! אוהב אותך ❤️");
                    confetti({
                        particleCount: 300,
                        spread: 120,
                        shapes: ['heart'],
                        colors: ['#ff0000', '#ffb3b3', '#f1c40f'],
                        origin: { y: 0.6 }
                    });
                }
                if (data.activeCard) {
                    // הרקע המקורי והחלק שלך!
                    gameBg.style.backgroundImage = `url('${data.activeCard.bg}')`;
                    
                    if (data.activeCard.drawnBy === currentPlayer) {
                        // הקלף אצלי
                        cardFrontImage.style.backgroundImage = `url('${data.activeCard.image}')`;
                        activeCardSlot.classList.add('flipped');
                        setStatusMsg("זה הקלף שלך!"); // שימוש בפונקציית הפעימה
                    } else {
                       // הקלף אצל הבת זוג
                       activeCardSlot.classList.remove('flipped');
                       activeCardBack.innerHTML = `<div class="partner-msg">הקלף של ${data.activeCard.drawnBy}</div>`;
                       
                       // בחירת הודעת המתנה רנדומלית וחיבור השם שלה אליה
                       const messagesArray = waitingMessages[data.activeCard.drawnBy] || ["מחכים שיסיימו..."]; 
                       const randomWait = messagesArray[Math.floor(Math.random() * messagesArray.length)];
                       setStatusMsg(randomWait);
                    }
                } else {
                    // אין קלף פעיל
                    gameBg.style.backgroundImage = `url('front-page.jpeg')`;
                    activeCardSlot.classList.remove('flipped');
                    activeCardBack.innerHTML = '';
                    setStatusMsg("תור מי לשלוף?");
                }
            });
           
        }
        window.addEventListener('beforeunload', () => {
            if (unsubscribeGameState) {
                unsubscribeGameState();
            }
        });
    </script>
</body>
</html>
