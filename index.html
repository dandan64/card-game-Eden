<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק הקלפים שלנו</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #password-screen, #login-screen, #game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        #password-screen {
            /* הפקודה הזו מוסיפה שכבה כהה שקופה ב-85% מעל התמונה שלכם */
            background-image: linear-gradient(rgba(44, 62, 80, 0.85), rgba(44, 62, 80, 0.85)), url('front-page.jpeg');
            background-size: cover;
            background-position: center;
        }
        #login-screen, #game-screen { display: none; }
        
        #password-input {
            padding: 10px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 8px;
            border: none;
        }
        .btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background-color: #c0392b; }
        
        /* אזור הקלפים */
        .cards-container {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }
        .card-slot {
            width: 250px;
            height: 350px;
            perspective: 1000px; /* תלת מימד */
        }
        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            cursor: pointer;
        }
        .card-slot.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 1.2rem;
        }
        /* גב הקלף - כאן תשים את העיצוב שלך */
        .card-back {
            background-image: url('card-back.png');
        }
        /* פני הקלף (המשימה) */
        .card-front {
            transform: rotateY(180deg);
            background-color: #ecf0f1
        }
        .partner-msg {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            color: white;
        }

        #status-msg { margin-top: 20px; font-size: 1.2rem; min-height: 30px; color: #f1c40f;}
        @media (max-width: 600px) {
            .card-slot { width: 160px; height: 240px; }
            .cards-container { gap: 15px; }
            .card-front, .card-back { font-size: 1rem; }
            h1 { font-size: 1.5rem; }
        }
        #game-background {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-color: #111;
            overflow: hidden;
            
            background-image: url('front-page.jpeg');
            background-size: 0 0; /* התמונה נטענת לכאן, אבל מוסתרת כדי שהשכבות למטה ישתמשו בה */
            transition: background-image 1.5s ease-in-out;
        }

        /* 2. השכבה האחורית (הקצוות): מתוחה לכל המסך ומטושטשת מאוד */
        #game-background::before {
            content: "";
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px; /* מתיחה להסתרת שוליים לבנים של טשטוש */
            
            background-image: inherit; /* יורש אוטומטית את התמונה מהאבא */
            background-size: cover; /* מותח כדי שלא יישארו חללים ריקים */
            background-position: center;
            
            filter: blur(25px); /* טשטוש כבד רק לקצוות הריקים! בלי הכהיה */
            z-index: 1;
            transition: background-image 1.5s ease-in-out;
        }

        /* 3. השכבה הקדמית (המרכז): התמונה המקורית בשלמותה, טשטוש עדין, בלי הכהיה */
        #game-background::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            
            background-image: inherit; /* יורש אוטומטית את התמונה מהאבא */
            background-size: contain; /* שומר על הפרופורציות - תמיד במרכז ולא נחתך! */
            background-position: center;
            background-repeat: no-repeat;
            
            filter: blur(2px); /* טשטוש מינימלי בקושי מורגש כדי לרכך מעט מתחת לקלף */
            z-index: 2; /* מוודא שזה יושב מעל הרקע המטושטש! */
            transition: background-image 1.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="game-background"></div>
    <div id="password-screen">
        <h1 style="color: #ffb3b3;">מתי התחלנו לצאת?</h1>
        <input type="tel" id="password-input" placeholder="הכנס תאריך...">
        <button class="btn" onclick="checkPassword()">היכנס</button>
        <div id="pass-error" style="color: #ffb8b8; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div id="login-screen">
        <h1>מי משחק עכשיו?</h1>
        <div>
            <button class="btn" onclick="joinGame('דניאל')">דניאל</button>
            <button class="btn" onclick="joinGame('עדן')">עדן</button>
        </div>
    </div>

    <div id="game-screen">
        <h2 id="welcome-msg"></h2>
        <div id="cards-count">קלפים נותרו: --</div>
        
        <div class="cards-container">
            <div class="card-slot" id="deck-slot" onclick="drawCard()">
                <div class="card-inner">
                    <div class="card-back">הערימה (שלוף)</div>
                </div>
            </div>

            <div class="card-slot" id="active-card-slot">
                <div class="card-inner" id="active-card-inner">
                    <div class="card-back" id="active-card-back">קלף של...</div>
                    <div class="card-front">
                        <div class="category" id="card-category"></div>
                        <div id="card-text"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="status-msg"></div>
        <button class="btn" style="margin-top: 50px; background-color: #7f8c8d;" onclick="resetGame()">ערבב והתחל מחדש</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // !!! הדבק כאן את ה-firebaseConfig שלך מ-Firebase Console !!!
        const firebaseConfig = {
            apiKey: "AIzaSyA9OVDYB_0ES8mFV8259XnXvHlEfhe1zs8",
            authDomain: "card-game-c3384.firebaseapp.com",
            databaseURL: "https://card-game-c3384-default-rtdb.firebaseio.com/",
            projectId: "card-game-c3384",
            storageBucket: "card-game-c3384.appspot.com",
            messagingSenderId: "826274012499",
            appId: "1:826274012499:web:27a9d98fd05693ad1bd5a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const allCards = Array.from({ length: 18 }, (_, i) => ({
            id: i + 1,
            image: `card${i + 1}.png`,
            bg: `bg${i + 1}.jpeg` // הוספנו את הקישור לתמונת הרקע הייעודית
        }));

        const cardBack = "card-back.png";

        let currentPlayer = "";
        
        window.checkPassword = function() {
            const pass = document.getElementById('password-input').value;
            if (pass === "23.3.25") { 
                // פיצוץ של קונפטי לבבות
                confetti({
                    particleCount: 1000,
                    spread: 700,
                    origin: { y: 0.6 },
                    shapes: ['heart'],
                    colors: ['#ff0000', '#ffb3b3']
                });
                
                // ממתינים שנייה וחצי כדי שתראו את הלבבות, ואז מעבירים מסך
                setTimeout(() => {
                    document.getElementById('password-screen').style.display = 'none';
                    document.getElementById('login-screen').style.display = 'flex';
                }, 1500);
            } else {
                document.getElementById('pass-error').innerText = "תאריך שגוי,  בזיון שאת לא זוכרת!!";
            }
        }
        document.getElementById('password-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // פונקציית התחברות
        window.joinGame = function(name) {
            currentPlayer = name;
            sessionStorage.setItem('savedPlayer', name);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('welcome-msg').innerText = `היי ${currentPlayer}!`;
            
            // האזנה לשינויים במסד הנתונים
            listenToGameState();
        }

        // פונקציה לערבוב מערך
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // אתחול משחק חדש ב-DB
        window.resetGame = async function() {
            const shuffled = shuffleArray(allCards);
            await set(ref(db, 'gameState'), {
                deck: shuffled,
                activeCard: null
            });
        }

        // שליפת קלף
        window.drawCard = async function() {
            const snapshot = await get(ref(db, 'gameState/deck'));
            let deck = snapshot.val();
            
            if (!deck || deck.length === 0) {
                document.getElementById('status-msg').innerText = "סיימנו את כל הקלפים! הגיע הזמן ליישם... 😉";
                return;
            }

            // מוציאים את הקלף העליון (האחרון במערך)
            const cardToDraw = deck.pop();

            // מעדכנים את ה-DB עם הערימה החדשה והקלף הפעיל
            await update(ref(db, 'gameState'), {
                deck: deck,
                activeCard: {
                    ...cardToDraw,
                    drawnBy: currentPlayer
                }
            });
        }

        // האזנה לשינויים בזמן אמת
        function listenToGameState() {
            const gameStateRef = ref(db, 'gameState');
            onValue(gameStateRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    // אם אין משחק פעיל, נייצר אחד
                    resetGame();
                    return;
                }

                // עדכון ספירת קלפים
                const deckCount = data.deck ? data.deck.length : 0;
                document.getElementById('cards-count').innerText = `קלפים נותרו: ${deckCount}`;

                const activeCardSlot = document.getElementById('active-card-slot');
                const statusMsg = document.getElementById('status-msg');
                const cardFrontImage = document.querySelector('.card-front');
                const activeCardBack = document.getElementById('active-card-back');
                const gameBg = document.getElementById('game-background');

                if (data.activeCard) {
                    gameBg.style.backgroundImage = `url('${data.activeCard.bg}')`;
                    if (data.activeCard.drawnBy === currentPlayer) {
                        // אם אני שלפתי את הקלף - תראה לי אותו
                        cardFrontImage.style.backgroundImage = `url('${data.activeCard.image}')`;
                        activeCardSlot.classList.add('flipped');
                        statusMsg.innerText = "זה הקלף שלך!";
                    } else {
                       // אם בן/בת הזוג שלף - תראה לי את הגב עם הודעה
                       activeCardSlot.classList.remove('flipped');
                        activeCardBack.innerHTML = `<div class="partner-msg">הקלף של ${data.activeCard.drawnBy}</div>`;
                        statusMsg.innerText = `${data.activeCard.drawnBy} שלפ/ה קלף. מחכים שיסיימו...`;
                    }
                } else {
                    gameBg.style.backgroundImage = `url('front-page.jpeg')`;
                    // אין קלף פעיל
                    activeCardSlot.classList.remove('flipped');
                    activeCardBack.innerHTML = '';
                    statusMsg.innerText = "תור מי לשלוף?";
                }
            });
        }
        window.onload = function() {
            const savedPlayer = sessionStorage.getItem('savedPlayer');
            if (savedPlayer) {
                // אם מצאנו שם שמור בזיכרון, נדלג ישר למשחק
                document.getElementById('password-screen').style.display = 'none';
                joinGame(savedPlayer);
            }
        };
    </script>
</body>
</html>
